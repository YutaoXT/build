# .github/workflows/Build Armbian.yml
name: "Build Armbian" # 工作流名称

# 触发条件：允许你手动在 Actions 页面点击 "Run workflow" 来启动构建[reference:2][reference:3]
on:
  workflow_dispatch:

jobs:
  build-armbian:
    # 运行环境：使用广泛支持的 Ubuntu 24.04 LTS (Noble) 作为构建主机[reference:4][reference:5]
    runs-on: ubuntu-26.04

    steps:
      # 1. 拉取 Armbian 构建框架的代码[reference:6]
      - name: Checkout build repo
        uses: actions/checkout@v4

      # 2. 安装构建所需的系统依赖包[reference:8]
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget git gcc make device-tree-compiler u-boot-tools \
                                  bc bison flex libssl-dev

      # 3. 执行构建命令，生成镜像[reference:9]
      - name: Build Armbian image
        run: |
          ./compile.sh BOARD=orangepilite \
                         RELEASE=resolute \
                         BUILD_DESKTOP=no \
                         BUILD_MINIMAL=yes \
                         KERNEL_CONFIGURE=no

      # 4. 将生成的镜像文件上传为 Artifact，方便你下载[reference:11]
      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: armbian-image
          path: output/images/*.img.xz
