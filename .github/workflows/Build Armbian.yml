name: "Build Armbian"

on:
  workflow_dispatch:

jobs:
  build-armbian:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget git gcc make device-tree-compiler u-boot-tools \
                                  bc bison flex libssl-dev \
                                  qemu-user-binfmt qemu-user

      - name: Build Armbian image
        run: |
          export DOCKER_EXTRA_ARGS="--privileged"
          ./compile.sh BOARD=orangepilite \
                         BRANCH=current \
                         RELEASE=resolute \
                         BUILD_DESKTOP=no \
                         BUILD_MINIMAL=yes \
                         KERNEL_CONFIGURE=no

      # 可选：列出文件以确认路径
      - name: List output files
        run: |
          echo "=== output/images/ ==="
          ls -la output/images/ || echo "Directory does not exist"
          echo "=== search for image files ==="
          find output -type f \( -name "*.img" -o -name "*.img.xz" -o -name "*.xz" \) | head -20

      - name: Upload artifact (for manual download)
        uses: actions/upload-artifact@v4
        with:
          name: armbian-image
          path: output/images/*

      # ==================== 自动发布到 Release ====================
      - name: Generate release tag and name
        id: vars
        run: |
          # 使用当前时间生成 tag，例如 v2026.07.23-123456
          TAG="v$(date +'%Y.%m.%d-%H%M%S')"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "release_name=Armbian for Orange Pi Lite ($TAG)" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.release_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            output/images/*.img.xz
            output/images/*.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
