name: "Build Armbian"

on:
  workflow_dispatch:

jobs:
  build-armbian:
    runs-on: ubuntu-26.04   # 按你的要求使用 26.04

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Ubuntu 26.04 中 qemu-user-static 已拆分为两个包
          sudo apt-get install -y wget git gcc make device-tree-compiler u-boot-tools \
                                  bc bison flex libssl-dev \
                                  qemu-user-binfmt qemu-user

      - name: Build Armbian image
        run: |
          export DOCKER_EXTRA_ARGS="--privileged"
          ./compile.sh BOARD=orangepilite \
                         BRANCH=current \
                         RELEASE=resolute \
                         BUILD_DESKTOP=no \
                         BUILD_MINIMAL=yes \
                         KERNEL_CONFIGURE=no

      # 调试：列出 output 目录下的文件（可选，但有助于排查）
      - name: List output files
        run: |
          echo "=== content of output/images/ ==="
          ls -la output/images/ || echo "output/images/ does not exist"
          echo "=== search for image files ==="
          find output -type f \( -name "*.img" -o -name "*.img.xz" -o -name "*.xz" \) | head -20

      # 上传步骤：使用宽泛通配符匹配所有文件
      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: armbian-image
          path: output/images/*   # 匹配 output/images/ 下所有文件
